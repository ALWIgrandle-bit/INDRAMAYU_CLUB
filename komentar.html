<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Diskusi</title>
  <style>
    :root{--green:#1d6b3a;--bg:#0a0a0a}
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{background:var(--bg);color:#fff;height:100vh;display:flex;flex-direction:column;font-size:10px;overflow:hidden}
    
    .input-area{padding:5px;background:#000;border-bottom:1px solid #333;display:flex;flex-direction:column;gap:4px}
    .field{width:100%;padding:4px;background:#1a1a1a;border:1px solid #333;color:#fff;font-size:10px}
    .btn{padding:6px;background:var(--green);color:#fff;border:none;font-weight:bold;font-size:10px;cursor:pointer}
    
    #diskusi{flex:1;overflow-y:auto;padding:5px;display:flex;flex-direction:column;gap:4px}
    .bubble{background:#151515;padding:5px;border-radius:4px;border:1px solid #222}
    .bubble-nama{color:#c9a227;font-weight:bold;font-size:9px;display:block}
  </style>
</head>
<body>

<div class="input-area">
  <input id="nama" class="field" placeholder="Nama...">
  <textarea id="pesan" class="field" placeholder="Pesan..." rows="2"></textarea>
  <button id="kirim" class="btn">KIRIM PESAN</button>
</div>

<div id="diskusi"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwHj8qSe7e_5eFHvWHeC-oYURd04uzW4iEyyjLTRZhoqjqoFzLdOmy3fsv05eWJR8d6yA/exec";
const diskusi = document.getElementById('diskusi');

function tambahPesan(nama, teks){
  const item = document.createElement('div');
  item.className = 'bubble';
  item.innerHTML = `<span class="bubble-nama">${nama}</span>${teks}`;
  diskusi.appendChild(item);
  diskusi.scrollTop = diskusi.scrollHeight; // Auto-scroll ke bawah[span_2](start_span)[span_2](end_span)
}

async function muatKomentar(){
  try{
    const res = await fetch(API_URL);
    const obj = await res.json();
    if(obj.komentar) {
      diskusi.innerHTML = "";
      obj.komentar.forEach(k => tambahPesan(k.nama, k.pesan));
    }
  } catch(e){}
}

async function kirimPesan(){
  const nama = document.getElementById('nama').value || 'Anonim';
  const pesan = document.getElementById('pesan').value;
  if(!pesan) return;
  
  // Tampilkan lokal dulu
  tambahPesan(nama, pesan);
  document.getElementById('pesan').value = '';
  
  const payload = { nama, pesan, timestamp: new Date().toISOString() };
  if(window.google && google.script){
    google.script.run.prosesDiskusi(payload);
  } else {
    fetch(API_URL, { method:'POST', mode:'no-cors', body: JSON.stringify(payload) });
  }
}

document.getElementById('kirim').onclick = kirimPesan;
window.onload = muatKomentar;
</script>
  <script src="alwi-grandle-core.js"></script>
</body>
</html>
