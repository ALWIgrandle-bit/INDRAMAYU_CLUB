<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suit Jepang - Nur 8</title>
<style>
  body { background: #f4e8cf; font-family: 'Special Elite', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  .box { background: white; border: 4px solid #3a2317; padding: 20px; border-radius: 20px; text-align: center; max-width: 400px; width: 100%; }
  .choices { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
  button { font-size: 24px; padding: 15px; cursor: pointer; border: 3px solid #3a2317; border-radius: 12px; background: #e8a838; }
  #result { font-weight: bold; font-size: 18px; margin-top: 15px; color: #cf5c26; }
</style>
</head>
<body>

<div class="box">
  <h1>✊✌️🖐️</h1>
  <p>Pilih tangan kamu !!</p>
  <div class="choices">
    <button onclick="play('Batu')">✊</button>
    <button onclick="play('Gunting')">✌️</button>
    <button onclick="play('Kertas')">🖐️</button>
  </div>
  <div id="result">Siap bermain?</div>
  <br>
  <a href="../nur8_emulator.html">⬅ Kembali</a>
</div>

<script>
  function play(pilihanUser) {
    const pilihan = ['Batu', 'Gunting', 'Kertas'];
    const komputer = pilihan[Math.floor(Math.random() * 3)];
    let hasil = "";

    if (pilihanUser === komputer) {
      hasil = "Seri! Lawan mengeluarkan " + komputer;
    } else if (
      (pilihanUser === 'Batu' && komputer === 'Gunting') ||
      (pilihanUser === 'Gunting' && komputer === 'Kertas') ||
      (pilihanUser === 'Kertas' && komputer === 'Batu')
    ) {
      hasil = "Bapak Menang! Lawan: " + komputer;
    } else {
      hasil = "Bapak Kalah! Lawan: " + komputer;
    }
    document.getElementById('result').innerText = hasil;
  }
</script>

<script src="components/agen_alwi.js"></script>
</body>
</html>
