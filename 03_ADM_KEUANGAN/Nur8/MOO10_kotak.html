<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lompat Kotak - Nur 10</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root{--mustard:#e8a838;--burnt:#cf5c26;--avocado:#6f8c3e;--cream:#f4e8cf;--brown:#3a2317;--teal:#237a7a;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:repeating-conic-gradient(from 0deg,var(--mustard) 0deg 10deg,var(--burnt) 10deg 20deg);background-attachment:fixed;font-family:'Special Elite',monospace;color:var(--brown);display:flex;flex-direction:column;align-items:center;padding:20px 14px 60px;}
  .frame{width:100%;max-width:420px;background:var(--cream);border:6px solid var(--brown);border-radius:26px;padding:22px 18px 30px;box-shadow:0 0 0 6px var(--mustard),0 12px 30px rgba(0,0,0,.5);text-align:center;}
  h1{font-family:'Bungee',cursive;font-size:22px;margin:0 0 4px;color:var(--burnt);text-shadow:3px 3px 0 var(--avocado);text-transform:uppercase;}
  .sub{font-size:11px;color:var(--teal);margin-bottom:14px;letter-spacing:2px;text-transform:uppercase;font-weight:bold;}
  canvas{background:var(--mustard);border:4px solid var(--brown);border-radius:12px;max-width:100%;touch-action:none;}
  #status{font-weight:bold;font-size:15px;margin:10px 0;color:var(--burnt);min-height:22px;}
  button.action{font-family:'Bungee',cursive;font-size:13px;background:var(--avocado);color:var(--cream);border:3px solid var(--brown);border-radius:20px;padding:12px 22px;cursor:pointer;box-shadow:0 4px 0 var(--brown);margin-top:8px;}
  button.action:active{transform:translateY(4px);box-shadow:0 0 0 var(--brown);}
  .back-link{display:inline-block;font-family:'Bungee',cursive;font-size:12px;color:var(--brown);background:var(--cream);border:3px solid var(--brown);border-radius:20px;padding:10px 18px;text-decoration:none;margin-top:16px;box-shadow:0 4px 0 var(--brown);}
  .back-link:active{transform:translateY(4px);box-shadow:0 0 0 var(--brown);}
</style>
</head>
<body>
<div class="frame">
  <h1>🟨 Lompat Kotak</h1>
  <div class="sub">Hindari Rintangan • Skor: <span id="score">0</span></div>
  <canvas id="game" width="320" height="200"></canvas>
  <div id="status">Tap / Spasi buat lompat!</div>
  <button class="action" onclick="startGame()">▶ MULAI</button>
  <br>
  <a class="back-link" href="../index.html">⬅ KEMBALI KE PORTAL</a>
</div>
<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const groundY = 160;
  let player, obstacles, speed, score, playing, frame, loopId;

  function startGame(){
    player = {x:40, y:groundY-30, w:26, h:30, vy:0, jumping:false};
    obstacles = [];
    speed = 4; score = 0; playing = true; frame = 0;
    document.getElementById('score').textContent = '0';
    document.getElementById('status').textContent = 'Tap / Spasi buat lompat!';
    if(loopId) cancelAnimationFrame(loopId);
    loop();
  }

  function jump(){
    if(!playing) return;
    if(!player.jumping){
      player.vy = -10;
      player.jumping = true;
    }
  }

  document.addEventListener('keydown', e => { if(e.code === 'Space'){ e.preventDefault(); jump(); } });
  canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); });
  canvas.addEventListener('mousedown', jump);

  function loop(){
    if(!playing) return;
    frame++;
    player.vy += 0.6;
    player.y += player.vy;
    if(player.y > groundY - player.h){
      player.y = groundY - player.h;
      player.vy = 0;
      player.jumping = false;
    }
    if(frame % Math.max(30, 70 - Math.floor(speed*3)) === 0){
      obstacles.push({x: canvas.width, y: groundY-22, w:20, h:22});
    }
    obstacles.forEach(o => o.x -= speed);
    obstacles = obstacles.filter(o => o.x + o.w > 0);
    obstacles.forEach(o => {
      if(!o.passed && o.x + o.w < player.x){ o.passed = true; score++; document.getElementById('score').textContent = score; speed += 0.08; }
    });
    for(const o of obstacles){
      if(player.x < o.x + o.w && player.x + player.w > o.x && player.y < o.y + o.h && player.y + player.h > o.y){
        playing = false;
        document.getElementById('status').textContent = '💀 Kena! Skor akhir: ' + score;
      }
    }
    draw();
    if(playing) loopId = requestAnimationFrame(loop);
  }

  function draw(){
    ctx.fillStyle = '#e8a838';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = '#3a2317';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(canvas.width, groundY);
    ctx.stroke();
    ctx.fillStyle = '#cf5c26';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = '#237a7a';
    obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
  }

  // draw idle frame
  player = {x:40, y:groundY-30, w:26, h:30, vy:0, jumping:false};
  obstacles = [];
  draw();
</script>
<script src="components/agen_alwi.js"></script>
</body>
</html>
