<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jukebox Ajaib - Nur 9</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --mustard: #e8a838;
    --burnt: #cf5c26;
    --avocado: #6f8c3e;
    --cream: #f4e8cf;
    --brown: #3a2317;
    --teal: #237a7a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: repeating-conic-gradient(from 0deg, var(--mustard) 0deg 10deg, var(--burnt) 10deg 20deg);
    background-attachment: fixed;
    font-family: 'Special Elite', monospace;
    color: var(--brown);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 14px 60px;
  }
  .frame {
    width: 100%;
    max-width: 420px;
    background: var(--cream);
    border: 6px solid var(--brown);
    border-radius: 26px;
    padding: 22px 18px 30px;
    box-shadow: 0 0 0 6px var(--mustard), 0 12px 30px rgba(0,0,0,.5);
    text-align: center;
  }
  h1 {
    font-family: 'Bungee', cursive;
    font-size: 22px;
    margin: 0 0 4px;
    color: var(--burnt);
    text-shadow: 3px 3px 0 var(--avocado);
    text-transform: uppercase;
  }
  .sub {
    font-size: 11px;
    color: var(--teal);
    margin-bottom: 18px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: bold;
  }
  .vinyl-wrap {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 10px auto 20px;
  }
  .quad {
    position: absolute;
    width: 130px;
    height: 130px;
    border: 4px solid var(--brown);
    cursor: pointer;
    opacity: 0.55;
    transition: opacity 0.1s;
  }
  .quad.active { opacity: 1; box-shadow: 0 0 25px 6px #fff inset; }
  #q0 { top: 0; left: 0; background: var(--burnt); border-radius: 100% 0 0 0; }
  #q1 { top: 0; right: 0; background: var(--teal); border-radius: 0 100% 0 0; }
  #q2 { bottom: 0; left: 0; background: var(--avocado); border-radius: 0 0 0 100%; }
  #q3 { bottom: 0; right: 0; background: var(--mustard); border-radius: 0 0 100% 0; }
  .center-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90px; height: 90px;
    background: var(--brown);
    border-radius: 50%;
    border: 4px solid var(--cream);
    color: var(--cream);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Bungee', cursive;
    font-size: 10px;
    z-index: 5;
    pointer-events: none;
  }
  #score { font-size: 20px; margin-top: 4px; }
  #status {
    font-weight: bold;
    font-size: 15px;
    margin: 10px 0 4px;
    color: var(--burnt);
    min-height: 22px;
  }
  button.start {
    font-family: 'Bungee', cursive;
    font-size: 13px;
    background: var(--avocado);
    color: var(--cream);
    border: 3px solid var(--brown);
    border-radius: 20px;
    padding: 12px 24px;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--brown);
    margin-top: 6px;
  }
  button.start:active { transform: translateY(4px); box-shadow: 0 0 0 var(--brown); }
  .back-link {
    display: inline-block;
    font-family: 'Bungee', cursive;
    font-size: 12px;
    color: var(--brown);
    background: var(--cream);
    border: 3px solid var(--brown);
    border-radius: 20px;
    padding: 10px 18px;
    text-decoration: none;
    margin-top: 18px;
    box-shadow: 0 4px 0 var(--brown);
  }
  .back-link:active { transform: translateY(4px); box-shadow: 0 0 0 var(--brown); }
</style>
</head>
<body>

<div class="frame">
  <h1>📀 Jukebox Ajaib</h1>
  <div class="sub">Ingat & Ulangi Nadanya, Cyy!</div>

  <div class="vinyl-wrap">
    <div class="quad" id="q0" data-idx="0"></div>
    <div class="quad" id="q1" data-idx="1"></div>
    <div class="quad" id="q2" data-idx="2"></div>
    <div class="quad" id="q3" data-idx="3"></div>
    <div class="center-label">
      <div>SKOR</div>
      <div id="score">0</div>
    </div>
  </div>

  <div id="status">Tekan PUTAR buat mulai party!</div>
  <button class="start" onclick="startGame()">▶ PUTAR</button>

  <br>
  <a class="back-link" href="../index.html">⬅ KEMBALI KE PORTAL</a>
</div>

<audio id="tone0" src="data:audio/wav;base64," ></audio>

<script>
  const quads = [document.getElementById('q0'), document.getElementById('q1'), document.getElementById('q2'), document.getElementById('q3')];
  const freqs = [261.6, 329.6, 392.0, 523.3]; // C E G C(oktaf) - kesan riang 60an
  const statusEl = document.getElementById('status');
  const scoreEl = document.getElementById('score');

  let sequence = [];
  let playerStep = 0;
  let acceptingInput = false;
  let level = 0;

  let audioCtx;
  function playTone(freq, duration = 350) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration / 1000);
  }

  function flash(idx, duration = 350) {
    quads[idx].classList.add('active');
    playTone(freqs[idx], duration);
    setTimeout(() => quads[idx].classList.remove('active'), duration);
  }

  function startGame() {
    sequence = [];
    level = 0;
    scoreEl.textContent = '0';
    nextRound();
  }

  function nextRound() {
    acceptingInput = false;
    playerStep = 0;
    level++;
    sequence.push(Math.floor(Math.random() * 4));
    statusEl.textContent = 'Merhatiin urutannya, ya...';
    let i = 0;
    const interval = setInterval(() => {
      flash(sequence[i]);
      i++;
      if (i >= sequence.length) {
        clearInterval(interval);
        setTimeout(() => {
          acceptingInput = true;
          statusEl.textContent = 'Giliran kamu! Tiru urutannya~';
        }, 500);
      }
    }, 600);
  }

  quads.forEach(q => {
    q.addEventListener('click', () => {
      if (!acceptingInput) return;
      const idx = parseInt(q.dataset.idx);
      flash(idx, 200);
      if (idx === sequence[playerStep]) {
        playerStep++;
        if (playerStep === sequence.length) {
          acceptingInput = false;
          scoreEl.textContent = (level - 1).toString();
          statusEl.textContent = 'Mantap! Lanjut ronde berikutnya...';
          setTimeout(nextRound, 900);
        }
      } else {
        acceptingInput = false;
        statusEl.textContent = 'Yah, meleset! Skor akhir: ' + (level - 1);
        quads.forEach(qq => qq.classList.add('active'));
        setTimeout(() => quads.forEach(qq => qq.classList.remove('active')), 400);
      }
    });
  });
</script>

<script src="components/agen_alwi.js"></script>
</body>
</html>
